{% extends "portal/public_base.html" %}
{% block title %}Password aggiornata{% endblock %}
{% block extra_head %}
<style>
  .auth-shell {
    min-height: calc(100vh - 6rem);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .auth-panel {
    width: 100%;
    max-width: 540px;
    border: 0;
    border-radius: 24px;
    padding: 2rem;
    box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
  }

  .auth-success {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #dbeafe;
    color: #1d4ed8;
    font-size: 1.75rem;
    font-weight: 700;
  }
</style>
{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="card auth-panel text-center">
    <div class="auth-success mx-auto mb-4">✓</div>
    <h1 class="h3 mb-3">Password aggiornata</h1>
    <p class="text-muted mb-4">
      La tua password è stata aggiornata correttamente. Ora puoi accedere con le nuove credenziali.
    </p>
    <a href="{% url 'login' %}" class="btn btn-dark px-4">Vai al login</a>
  </div>
</div>
{% endblock %}
