<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Benvenuto nel Portale Cedolini</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        h1 {
            margin-top: 0;
            font-size: 22px;
        }
        p {
            color: #555;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #1f2937;
        }
        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="container">

    <h1>Benvenuto nel Portale Cedolini</h1>

    <p>
        Attraverso questo portale potrai:
        <br>• Visualizzare i tuoi cedolini
        <br>• Scaricarli in PDF
        <br>• Consultare lo storico dei documenti
    </p>

    <p>Per completare l’attivazione, inserisci i tuoi dati e crea una password.</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input type="text" name="first_name" placeholder="Nome" required>
        <input type="text" name="last_name" placeholder="Cognome" required>

        <input type="password" name="password" placeholder="Nuova password (min 8 caratteri)" required>
        <input type="password" name="confirm_password" placeholder="Conferma password" required>

        <button type="submit">Attiva Account</button>
    </form>

</div>
</body>
</html>
