{% extends "portal/base.html" %}
{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Importa Cedolini (Cartella Periodo)</h2>

    <!-- MESSAGGI -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="card p-4 shadow-sm">

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold">
                    Seleziona tutti i PDF del mese
                </label>

                <input type="file"
                       name="folder"
                       multiple
                       webkitdirectory
                       directory
                       class="form-control"
                       accept=".pdf">
            </div>

            <button type="submit" class="btn btn-primary">
                Importa Cedolini
            </button>
        </form>

    </div>

</div>

{% endblock %}
