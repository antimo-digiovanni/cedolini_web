{% extends "portal/base.html" %}
{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Importa Cedolini (Cartella Periodo)</h2>

    <div class="card p-4 shadow-sm">

        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold">
                    Seleziona tutti i PDF del mese
                </label>

                <input type="file"
                       name="folder"
                       multiple
                       webkitdirectory
                       directory
                       class="form-control"
                       accept=".pdf">
            </div>

            <button type="submit" class="btn btn-primary">
                Importa Cedolini
            </button>
        </form>

        <!-- BARRA PROGRESSO -->
        <div class="progress mt-4" style="height:25px; display:none;" id="progressContainer">
            <div id="progressBar"
                 class="progress-bar progress-bar-striped progress-bar-animated"
                 role="progressbar"
                 style="width: 0%">
                0%
            </div>
        </div>

        <!-- RISULTATO -->
        <div id="resultBox" class="mt-3"></div>

    </div>

</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", function(e) {

    e.preventDefault();

    const form = this;
    const formData = new FormData(form);
    const progressContainer = document.getElementById("progressContainer");
    const progressBar = document.getElementById("progressBar");
    const resultBox = document.getElementById("resultBox");

    progressContainer.style.display = "block";
    progressBar.style.width = "0%";
    progressBar.innerHTML = "0%";
    resultBox.innerHTML = "";

    fetch("", {
        method: "POST",
        body: formData,
        headers: {
            "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            alert(data.error);
            return;
        }

        const jobId = data.job_id;

        const interval = setInterval(() => {

            fetch(`/import-progress/${jobId}/`)
            .then(res => res.json())
            .then(progress => {

                progressBar.style.width = progress.percent + "%";
                progressBar.innerHTML = progress.percent + "%";

                if (progress.status === "completed") {
                    clearInterval(interval);

                    resultBox.innerHTML = `
                        <div class="alert alert-success">
                            ✅ Import completato<br>
                            Cedolini creati: ${progress.created_payslips}<br>
                            Nuovi utenti: ${progress.created_users}<br>
                            Saltati: ${progress.skipped}
                        </div>
                    `;
                }

                if (progress.status === "error") {
                    clearInterval(interval);
                    alert("Errore durante import");
                }

            });

        }, 1000);

    });

});
</script>

{% endblock %}
