{% extends "portal/base.html" %}
{% block title %}Import Mese{% endblock %}

{% block content %}

<div class="container">

    <div class="mb-4">
        <h2 class="fw-bold">Upload Cedolini (Cartella Periodo)</h2>
        <p class="text-muted">Seleziona la cartella del mese (es: 2024 Dicembre)</p>
    </div>

    <div class="card-modern p-4">

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Seleziona la cartella del mese
                </label>

                <input
                    type="file"
                    name="folder"
                    class="form-control"
                    webkitdirectory
                    directory
                    multiple
                >
            </div>

            <button type="submit" class="btn btn-primary">
                Importa Cedolini
            </button>

        </form>

    </div>

</div>

{% endblock %}
