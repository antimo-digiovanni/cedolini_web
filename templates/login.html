<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - Portale Cedolini</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div style="background:white; padding:40px; border-radius:8px; box-shadow:0 0 15px rgba(0,0,0,0.1); width:320px;">
        
        <h2 style="text-align:center; margin-bottom:20px;">Portale Cedolini</h2>

        {% if form.errors %}
            <p style="color:red; font-size:14px;">Username o password non validi.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div style="margin-bottom:15px;">
                <label>Username</label><br>
                {{ form.username }}
            </div>

            <div style="margin-bottom:20px;">
                <label>Password</label><br>
                {{ form.password }}
            </div>

            <button type="submit" style="width:100%; padding:10px; background:#0d6efd; color:white; border:none; border-radius:4px;">
                Accedi
            </button>
        </form>

    </div>

</body>
</html>
