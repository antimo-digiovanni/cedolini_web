{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Portale Cedolini</title>
<link rel="manifest" href="{% url 'employee_webmanifest' %}">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cedolini SV">
<link rel="icon" type="image/png" sizes="16x16" href="{% url 'favicon_16_png' %}">
<link rel="icon" type="image/png" sizes="32x32" href="{% url 'favicon_32_png' %}">
<link rel="icon" type="image/png" sizes="192x192" href="{% static 'portal/icons/icon-192.png' %}">
<link rel="icon" type="image/png" sizes="512x512" href="{% static 'portal/icons/icon-512.png' %}">
<link rel="shortcut icon" type="image/png" href="{% static 'portal/icons/icon-192.png' %}">
<link rel="apple-touch-icon" sizes="180x180" href="{% url 'apple_touch_icon' %}">
<link rel="apple-touch-icon-precomposed" href="{% url 'apple_touch_icon_precomposed' %}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    min-height: 100dvh;
    background: radial-gradient(circle at 20% 30%, #1e3a8a, #0f172a 60%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 18px 14px;
    overflow-x: hidden;
    overflow-y: auto;
    transition: opacity 0.4s ease, transform 0.4s ease;
}

/* Background animation desktop */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(37,99,235,0.25), transparent 70%);
    animation: pulse 6s infinite alternate;
}

@keyframes pulse {
    from { transform: translate(-40px, -40px) scale(1); }
    to { transform: translate(40px, 40px) scale(1.2); }
}

/* Fade slide out */
body.fade-out {
    opacity: 0;
    transform: translateX(-30px);
}

/* Card */
.login-card {
    width: min(420px, calc(100vw - 28px));
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius: 22px;
    box-shadow: 0 30px 70px rgba(0,0,0,0.6);
    overflow: hidden;
    color: white;
    animation: fadeIn 0.7s ease;
    position: relative;
    z-index: 2;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Logo */
.logo-section {
    background: white;
    padding: 30px 0;
    text-align: center;
}

.logo-section img {
    max-height: 85px;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

/* Body */
.login-body {
    padding: 40px;
}

.login-title {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 30px;
}

/* Input */
.input-group {
    position: relative;
    margin-bottom: 22px;
}

.input-group i.left-icon {
    position: absolute;
    top: 50%;
    left: 15px;
    transform: translateY(-50%);
    color: #93c5fd;
}

.input-group input {
    width: 100%;
    padding: 14px 45px 14px 42px;
    border-radius: 12px;
    border: none;
    background-color: #2563eb;
    color: white;
    transition: 0.2s ease;
}

.input-group input::placeholder {
    color: #dbeafe;
}

.input-group input:focus {
    background-color: #1d4ed8;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.4);
    outline: none;
}

/* Toggle password */
.toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #dbeafe;
}

/* Button */
.btn-login {
    width: 100%;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-weight: 600;
    transition: 0.25s ease;
}

.btn-login:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 25px rgba(0,0,0,0.4);
}

/* Footer */
.custom-footer {
    position: fixed;
    bottom: 15px;
    right: 25px;
    font-size: 0.8rem;
    color: #cbd5e1;
    max-width: min(320px, calc(100vw - 24px));
    text-align: right;
}

/* MOBILE OPTIMIZATION */
@media(max-width: 768px) {

    body {
        background: #0f172a;
        align-items: stretch;
        justify-content: flex-start;
        padding: 0;
        overflow-y: auto;
    }

    body::before {
        display: none;
    }

    .login-card {
        width: 100vw;
        min-height: 100dvh;
        border-radius: 0;
        margin: 0;
        box-shadow: none;
        display: flex;
        flex-direction: column;
    }

    .login-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 28px 22px 92px;
    }

    .login-title {
        font-size: 1.4rem;
    }

    .input-group input {
        padding: 16px 45px 16px 42px;
        font-size: 1rem;
    }

    .btn-login {
        padding: 16px;
        font-size: 1rem;
    }

    .custom-footer {
        position: fixed;
        left: 14px;
        right: auto;
        bottom: calc(10px + env(safe-area-inset-bottom));
        text-align: left;
        margin: 0;
        max-width: 70vw;
        z-index: 4;
    }
}
</style>
</head>

<body>

<div class="login-card">

    <div class="logo-section">
        <img src="{% static 'portal/logo.png' %}" alt="Logo">
    </div>

    <div class="login-body">

        <div class="login-title">
            Portale Cedolini
        </div>

        <p class="text-center text-white-50 small mt-n2 mb-3">Accedi con username oppure email</p>

        {% if form.errors %}
        <div class="alert alert-danger">
            Username o password non corretti
        </div>
        {% endif %}

        <form method="post" id="loginForm">
            {% csrf_token %}

            <div class="input-group">
                <i class="bi bi-person left-icon"></i>
                {{ form.username }}
            </div>

            <div class="input-group">
                <i class="bi bi-lock left-icon"></i>
                {{ form.password }}
                <i class="bi bi-eye toggle-password" onclick="togglePassword()"></i>
            </div>

            <button type="submit" class="btn btn-login text-white">
                Accedi
            </button>

            <div class="text-center mt-3">
                <a href="{% url 'password_reset' %}" class="text-white-50 text-decoration-none small">
                    Password dimenticata?
                </a>
            </div>
        </form>

    </div>
</div>

<div class="custom-footer">
    Sistema sviluppato da <strong>Antimo Di Giovanni</strong>
</div>

<script>
function togglePassword() {
    const passwordField = document.querySelector('input[name="password"]');
    const icon = document.querySelector('.toggle-password');

    if (passwordField.type === "password") {
        passwordField.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        passwordField.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}

/* Fade + slide on submit */
document.getElementById("loginForm").addEventListener("submit", function(){
    document.body.classList.add("fade-out");
});
</script>

</body>
</html>
