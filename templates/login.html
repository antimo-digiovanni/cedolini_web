{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Login - Portale Cedolini</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
}

.login-card {
    width: 420px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 45px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    color: white;
}

.login-card img {
    max-height: 90px;
    margin-bottom: 20px;
}

.login-title {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 25px;
}

.form-control {
    border-radius: 12px;
    padding: 14px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
}

.form-control:focus {
    background: rgba(255,255,255,0.25);
    box-shadow: none;
}

.btn-login {
    background-color: #2563eb;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-weight: 600;
}

.btn-login:hover {
    background-color: #1d4ed8;
}

.footer-text {
    margin-top: 20px;
    font-size: 0.8rem;
    color: #cbd5e1;
}
</style>
</head>

<body>

<div class="login-card text-center">

    <img src="{% static 'portal/logo.png' %}" alt="Logo">

    <div class="login-title">
        Portale Cedolini
    </div>

    {% if form.errors %}
    <div class="alert alert-danger text-start">
        Username o password non corretti
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3 text-start">
            {{ form.username }}
        </div>
        <div class="mb-3 text-start">
            {{ form.password }}
        </div>

        <button type="submit" class="btn btn-login w-100 text-white">
            Accedi
        </button>
    </form>

    <div class="footer-text">
        Sistema Sicuro • San Vincenzo
    </div>

</div>

</body>
</html>
