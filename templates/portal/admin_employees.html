{% extends "portal/base.html" %}
{% block content %}

<h2 class="mb-4">Dipendenti</h2>

<div class="card-modern">
<table class="table table-hover">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Azioni</th>
        </tr>
    </thead>
    <tbody>
        {% for emp in employees %}
        <tr>
            <td>{{ emp.full_name }}</td>
            <td>
                <a href="{% url 'admin_employee_detail' emp.id %}" class="btn btn-primary btn-sm">
                    Vedi Cedolini
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>

{% endblock %}
