{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Attivazione Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
}

.card-box {
    background: white;
    padding: 40px;
    border-radius: 18px;
    width: 420px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    text-align: center;
}

.logo-bg {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
}

button {
    background: #2563eb;
    border: none;
    padding: 10px;
    width: 100%;
    color: white;
    font-weight: 600;
    border-radius: 8px;
}

button:hover {
    background: #1e40af;
}

.error {
    color: red;
    margin-bottom: 15px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="card-box">

    <div class="logo-bg">
        <img src="{% static 'portal/logo.png' %}" style="max-height:70px;">
    </div>

    <h4 class="mb-3">Benvenuto nel Portale Cedolini</h4>

    <p class="text-muted mb-4">
        Completa i tuoi dati per attivare il tuo account.
    </p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text"
               name="first_name"
               class="form-control mb-3"
               placeholder="Nome"
               required>

         <input type="text"
             name="last_name"
             class="form-control mb-3"
             placeholder="Cognome"
             required>

         <div class="input-group mb-3">
             <input type="password"
                 id="password"
                 name="password"
                 class="form-control"
                 placeholder="Nuova password"
                 required>
             <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', this)">
              <i class="bi bi-eye"></i>
             </button>
         </div>

         <div class="input-group mb-4">
             <input type="password"
                 id="confirm_password"
                 name="confirm_password"
                 class="form-control"
                 placeholder="Conferma password"
                 required>
             <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirm_password', this)">
              <i class="bi bi-eye"></i>
             </button>
         </div>

        <button type="submit">
            Attiva Account
        </button>
    </form>

</div>

<script>
function togglePassword(inputId, btn) {
    var input = document.getElementById(inputId);
    if (!input) return;
    var icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        if (icon) {
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        }
    } else {
        input.type = 'password';
        if (icon) {
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }
}
</script>

</body>
</html>
