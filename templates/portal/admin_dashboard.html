{% extends "portal/base.html" %}
{% block title %}Dashboard Admin{% endblock %}

{% block content %}

<div class="container">

    <div class="mb-4">
        <h2>Dashboard Admin</h2>
        <p class="text-muted">Monitoraggio completo del sistema</p>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card-modern text-center bg-white">
                <i class="bi bi-file-earmark-text" style="font-size:2rem; color:#2563eb;"></i>
                <h3 class="mt-3 counter" data-target="{{ totale_cedolini }}">0</h3>
                <p class="text-muted mb-0">Totale Cedolini</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-modern text-center bg-white">
                <i class="bi bi-eye" style="font-size:2rem; color:#10b981;"></i>
                <h3 class="mt-3 counter" data-target="{{ visualizzati }}">0</h3>
                <p class="text-muted mb-0">Visualizzati</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-modern text-center bg-white">
                <i class="bi bi-eye-slash" style="font-size:2rem; color:#ef4444;"></i>
                <h3 class="mt-3 counter" data-target="{{ non_visualizzati }}">0</h3>
                <p class="text-muted mb-0">Non Visualizzati</p>
            </div>
        </div>

    </div>

    <div class="mt-5 card-modern bg-white">
        <h5 class="mb-4">Distribuzione Visualizzazioni</h5>
        <canvas id="statsChart" height="100"></canvas>
    </div>

</div>

<script>
const counters = document.querySelectorAll('.counter');

counters.forEach(counter => {
    const updateCount = () => {
        const target = +counter.getAttribute('data-target');
        const count = +counter.innerText;
        const increment = target / 50;

        if(count < target){
            counter.innerText = Math.ceil(count + increment);
            setTimeout(updateCount, 20);
        } else {
            counter.innerText = target;
        }
    };
    updateCount();
});

const ctx = document.getElementById('statsChart');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Visualizzati', 'Non Visualizzati'],
        datasets: [{
            data: [{{ visualizzati }}, {{ non_visualizzati }}],
            backgroundColor: [
                '#10b981',
                '#ef4444'
            ],
            borderWidth: 0
        }]
    },
    options: {
        plugins: {
            legend: {
                position: 'bottom'
            }
        }
    }
});
</script>

{% endblock %}
