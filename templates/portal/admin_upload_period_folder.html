{% extends "portal/base.html" %}
{% block title %}Import Mese{% endblock %}

{% block content %}

<div class="container">

    <div class="mb-4">
        <h2 class="fw-bold">Import Mese</h2>
        <p class="text-muted">Carica una cartella contenente i cedolini del mese</p>
    </div>

    <div class="card-modern bg-white">

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Seleziona cartella</label>
                <input type="file" name="folder" class="form-control" webkitdirectory directory multiple>
            </div>

            <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-upload"></i> Carica
            </button>

        </form>

    </div>

</div>

{% endblock %}
