{% extends "portal/base.html" %}
{% load static %}

{% block content %}

<div class="container mt-4">

    <div class="card-modern">

        <h4 class="mb-4">
            <i class="bi bi-folder2-open"></i> Upload Cedolini (Cartella Periodo)
        </h4>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post"
              enctype="multipart/form-data">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    Seleziona tutti i PDF del mese
                </label>

                <input type="file"
                       name="folder"
                       class="form-control"
                       multiple
                       accept="application/pdf"
                       required>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="bi bi-upload"></i> Carica Cedolini
            </button>

        </form>

    </div>

</div>

{% endblock %}
