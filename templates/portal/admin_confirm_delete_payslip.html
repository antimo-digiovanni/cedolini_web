{% extends "portal/base.html" %}
{% block content %}
<div class="container">
  <div class="page-hero mb-4">
    <h2 class="fw-bold mb-1">Conferma Cancellazione</h2>
    <p class="mb-0 opacity-75">Controlla i dettagli prima di eliminare il cedolino.</p>
  </div>
  <p>Stai per cancellare il cedolino: <b>{{ payslip.employee.full_name }}</b> - <b>{{ payslip.month }}/{{ payslip.year }}</b></p>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sì, cancella</button>
    <a class="btn" href="{% url 'admin_employee_payslips' payslip.employee.id %}">Annulla</a>
  </form>
</div>
{% endblock %}
